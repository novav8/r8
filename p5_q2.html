<body>

    <div class="container">
        <h2>4.Stored Procedures: </h2>
  <h2> a) Create a stored procedure that accepts two numbers and prints their sum</h2>

<textarea id="code1"  rows="10" cols="80">
    CREATE OR REPLACE PROCEDURE calc_sum (
    num1 IN NUMBER,
    num2 IN NUMBER
)
IS
    total NUMBER;
BEGIN
    total := num1 + num2;
    DBMS_OUTPUT.PUT_LINE('Sum = ' || total);
END;
/
Execute the procedure
BEGIN
    calc_sum(10, 5);
END;
/
</textarea>
<button onclick="copyCode('code1', this)">Copy</button>

<br><br>
<h2>b) Alter the procedure to also calculate the difference.</h2>
<textarea id="code2"  rows="10" cols="80">
    CREATE OR REPLACE PROCEDURE calc_sum (
    num1 IN NUMBER,
    num2 IN NUMBER
)
IS
    total NUMBER;
    diff  NUMBER;
BEGIN
    total := num1 + num2;
    diff  := num1 - num2;

    DBMS_OUTPUT.PUT_LINE('Sum = ' || total);
    DBMS_OUTPUT.PUT_LINE('Difference = ' || diff);
END;
/
Execute the altered procedure
BEGIN
    calc_sum(20, 8);
END;
/
</textarea>
<button onclick="copyCode('code2', this)">Copy</button>

<script>
function copyCode(id, btn) {
  let text = document.getElementById(id).value;

  navigator.clipboard.writeText(text);

  btn.innerText = "✅ Copied!";
  
  setTimeout(() => {
    btn.innerText = "📋 Copy";
  }, 2000);
}
</script>
