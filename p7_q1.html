<!DOCTYPE html>
<html>
<head>
    <title>Practical Page</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 40px;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 700px;
        }

        h1 {
            margin-bottom: 20px;
        }

        img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .back-btn:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>

    <div class="container">
          <h2>Q.1 Implement recursive algorithm e.g., factorial</h2>
<textarea id="code1" rows="10" cols="80">
def factorial(n):
    if n == 0 or n == 1:   # Base case
        return 1
    else:
        return n * factorial(n - 1)   # Recursive call

num = int(input("Enter a number: "))
print("Factorial =", factorial(num))</textarea>
<button onclick="copyCode('code1', this)">Copy</button>

<br><br>
           <h2>Q.2 Implement recursive algorithm e.g., Fibonacci</h2>

<textarea id="code2"rows="10" cols="80">
def fibonacci(n):
    if n <= 1:   # Base case
        return n
    else:
        return fibonacci(n - 1) + fibonacci(n - 2)

num = int(input("Enter number of terms: "))

print("Fibonacci series:")
for i in range(num):
    print(fibonacci(i), end=" ")</textarea>
<button onclick="copyCode('code2', this)">Copy</button>

<script>
function copyCode(id, btn) {
  let text = document.getElementById(id).value;

  navigator.clipboard.writeText(text);

  btn.innerText = "✅ Copied!";
  
  setTimeout(() => {
    btn.innerText = "📋 Copy";
  }, 2000);
}
</script>

    </div>

</body>
</html>
