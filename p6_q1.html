        <h2> 5.Functions and Recursion:</h2>
          <h2>a) Function to return the square of a number</h2>
<textarea id="code1" rows="10" cols="80">
CREATE OR REPLACE FUNCTION square_num (
    n IN NUMBER
)
RETURN NUMBER
IS
BEGIN
    RETURN n * n;
END;
/
</textarea>
<button onclick="copyCode('code1', this)">Copy</button>

<br><br>
        <h2>b) Recursive function to calculate factorial of a number</h2>
   <textarea id="code2" rows="10" cols="80">CREATE OR REPLACE FUNCTION factorial (
    n IN NUMBER
)
RETURN NUMBER
IS
BEGIN
    IF n = 0 OR n = 1 THEN
        RETURN 1;
    ELSE
        RETURN n * factorial(n - 1);
    END IF;
END;
/</textarea>
<button onclick="copyCode('code2', this)">Copy</button>

<br><br>
        <h2>c) Call the functions from another PL/SQL block and print the result</h2>
        <textarea id="code3" rows="10" cols="80">SET SERVEROUTPUT ON;

DECLARE
    num NUMBER := 5;
    sq  NUMBER;
    fact NUMBER;
BEGIN
    sq := square_num(num);
    fact := factorial(num);

    DBMS_OUTPUT.PUT_LINE('Square of ' || num || ' = ' || sq);
    DBMS_OUTPUT.PUT_LINE('Factorial of ' || num || ' = ' || fact);
END;
/</textarea>
<button onclick="copyCode('code3', this)">Copy</button>

<br><br>
<script>
function copyCode(id, btn) {
  let text = document.getElementById(id).value;

  navigator.clipboard.writeText(text);

  btn.innerText = "✅ Copied!";
  
  setTimeout(() => {
    btn.innerText = "📋 Copy";
  }, 2000);
}
</script>
